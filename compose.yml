services:
  postgres:
    image: 'postgres:18-alpine'
    container_name: votes-poc-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    networks:
      - 'votes-poc-network'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: 'dpage/pgadmin4:latest'
    container_name: votes-poc-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'True'
      PGADMIN_CONFIG_ENABLE_GRAVATAR: 'False'
    ports:
      - '${PGADMIN_PORT}:80'
    volumes:
      - 'pgadmin_data:/var/lib/pgadmin'
    networks:
      - 'votes-poc-network'
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: 'bitnami/redis:latest'
    container_name: votes-poc-redis
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DISABLE_COMMANDS=FLUSHDB,FLUSHALL
      - REDIS_AOF_ENABLED="yes"
      - REDIS_EXTRA_FLAGS=--maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - 'redis_data:/bitnami/redis/data'
    networks:
      - 'votes-poc-network'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redisinsight:
    image: redis/redisinsight:latest
    container_name: votes-poc-redisinsight
    ports:
      - "${REDISINSIGHT_PORT}:5540"
    networks:
      - 'votes-poc-network'
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - 'redisinsight_data:/data'

networks:
  votes-poc-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  redisinsight_data:
